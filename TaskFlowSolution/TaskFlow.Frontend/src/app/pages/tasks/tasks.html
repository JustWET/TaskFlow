<div class="container py-4">

    <app-task-toolbar
        [query]="query"
        [totalPages] = "totalPages"
        [categories]="categories"
        (queryChanged)="onQueryChanged($event)"
        (createTask)="createTask()"
        (manageCategories)="openCategoryManager()"
        (goBack)="goBack()">
    </app-task-toolbar>

    <app-task-table
        class="mt-4"
        title="Active Tasks"
        [tasks]="activeTasks"
        [(collapsed)]="activeCollapsed"
        
        (edit)="openEditTask($event)"
        (delete)="deleteTask($event)"
        (rename)="renameTask($event)"
        (completedChanged)="toggleCompleted($event)"
        (priorityChanged)="changePriority($event)"
        (dueDateChanged)="changeDueDate($event)">
    </app-task-table>

    <app-task-table
        class="mt-4"
        title="Completed Tasks"
        [tasks]="completedTasks"
        [(collapsed)]="completedCollapsed"
        
        (edit)="openEditTask($event)"
        (delete)="deleteTask($event)"
        (rename)="renameTask($event)"
        (completedChanged)="toggleCompleted($event)"
        (priorityChanged)="changePriority($event)"
        (dueDateChanged)="changeDueDate($event)">
    </app-task-table>

    <app-task-edit-modal
        [visible]="showEditModal"
        [task]="selectedTask"
        [categories]="categories"
        (close)="closeEditTask()"
        (save)="saveTask($event)"
        (createCategory)="createCategory($event)">
    </app-task-edit-modal>

    <app-category-manager-modal
        [visible]="showCategoryManager"
        [categories]="categories"
        (close)="closeCategoryManager()"
        (create)="createCategory($event)"
        (rename)="renameCategory($event)"
        (delete)="deleteCategory($event)">
    </app-category-manager-modal>

</div>
