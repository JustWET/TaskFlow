<div class="card toolbar shadow-sm">

    <div class="card-body">

        <div class="row g-3 align-items-center">

            <div class="col-lg-4">

                <div class="input-group">

                    <span class="input-group-text">

                        <i class="bi bi-search"></i>

                    </span>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Search tasks..."
                        [ngModel]="query.search ?? ''"
                        (ngModelChange)="onSearchChanged($event)">

                </div>

            </div>

            <div class="col-lg-3">

                <select
                    class="form-select"
                    [ngModel]="query.categoryId ?? ''"
                    (ngModelChange)="onCategoryChanged($event)">

                    <option value="">

                        All Categories

                    </option>

                    @for (category of categories; track category.id) {

                        <option [value]="category.id">

                            {{ category.name }}

                        </option>

                    }

                </select>

            </div>

            <div class="col-lg-2">

                <select
                    class="form-select"
                    [ngModel]="query.sortBy"
                    (ngModelChange)="onSortChanged($event)">

                    <option [ngValue]="undefined">

                        No Sorting

                    </option>

                    @for (sortBy of sortOptions; track sortBy) {

                        @if (sortBy !== TaskSortBy.None) {

                            <option [ngValue]="sortBy">

                                {{ sortLabels[sortBy] }}

                            </option>

                        }

                    }

                </select>

            </div>

            <div class="col-lg-1">

                <button
                    class="btn btn-outline-secondary w-100"
                    type="button"
                    (click)="toggleDirection()">

                    <i
                        class="bi"
                        [class.bi-sort-down]="query.descending"
                        [class.bi-sort-up]="!query.descending">

                    </i>

                </button>

            </div>

            <div class="col-lg-2">

                <button
                    class="btn btn-primary w-100"
                    type="button"
                    (click)="createTask.emit()">

                    <i class="bi bi-plus-lg me-2"></i>

                    New Task

                </button>

            </div>

        </div>

        <hr>

        <div class="d-flex justify-content-between align-items-center">

            <button
                class="btn btn-outline-secondary btn-sm"
                type="button"
                (click)="clearFilters()">

                <i class="bi bi-arrow-counterclockwise me-2"></i>

                Reset Filters

            </button>

            <div class="btn-group">

                <button
                    class="btn btn-outline-secondary btn-sm"
                    type="button"
                    (click)="previousPage()">

                    <i class="bi bi-chevron-left"></i>

                </button>

                <button
                    class="btn btn-outline-secondary btn-sm"
                    type="button"
                    disabled>

                    Page {{ query.page }}

                </button>

                <button
                    class="btn btn-outline-secondary btn-sm"
                    type="button"
                    (click)="nextPage()">

                    <i class="bi bi-chevron-right"></i>

                </button>

            </div>

        </div>

    </div>

</div>
